<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrarse - NERD STORE</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <h1 style="text-align:center; margin-top:80px;">Crear Cuenta</h1>

  <div class="form" style="max-width:420px; margin:50px auto;">
    <input id="email" type="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Contraseña">

    <button class="action-btn" onclick="register()" style="width:100%; margin-top:10px;">
      Registrarse
    </button>

    <p style="text-align:center; margin-top:25px;">
      ¿Ya tienes cuenta? 
      <a href="login.html" style="color:#7c3aed; text-decoration:none;">Iniciar sesión</a>
    </p>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/toast.js"></script>
</body>
</html>
