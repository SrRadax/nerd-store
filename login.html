<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - NERD STORE</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .login-container {
      max-width: 420px;
      margin: 100px auto;
      padding: 40px 30px;
      background: rgba(17, 17, 17, 0.95);
      border-radius: 20px;
      border: 1px solid rgba(124, 58, 237, 0.3);
      text-align: center;
    }
    .login-container h1 {
      margin-bottom: 30px;
      color: #c026d3;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>⚡ NERD STORE</h1>
    <h2>Iniciar Sesión</h2>
    
    <div class="form" style="max-width:100%;">
      <input id="user" type="text" placeholder="Usuario o Email">
      <input id="pass" type="password" placeholder="Contraseña">
      <button class="action-btn" onclick="login()" style="width:100%; margin-top:15px;">
        Ingresar
      </button>
      <p style="text-align:center; margin-top:25px;">
        ¿No tienes cuenta? 
        <a href="register.html" style="color:#c026d3; text-decoration:none;">Registrarse</a>
      </p>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/toast.js"></script>
</body>
</html>
